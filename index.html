<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مرحباً بك - منشورات الأندية</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-direction: column;
        }
        body::before, body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            z-index: -2;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body::before { background-image: url('bg1.jpg'); opacity: 0; }
        body::after { background-image: url('bg2.jpg'); opacity: 1; }
        @media (max-width: 580px) { body::before { opacity: 1; } body::after { opacity: 0; } }

        /* زر نشر */
        .search-partner-btn {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 215, 120, 0.5);
            border-radius: 60px;
            padding: 10px 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            z-index: 150;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .search-partner-btn:hover { transform: translateX(-50%) scale(1.02); background: rgba(0, 0, 0, 0.8); border-color: rgba(255, 215, 120, 0.9); }
        .search-partner-btn svg { width: 22px; height: 22px; stroke: #FFD966; stroke-width: 1.8; fill: none; }
        .search-partner-btn span { color: #FFE8B6; font-size: 15px; font-weight: 500; }

        /* كارد إضافة منشور */
        .search-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.92);
            background: rgba(10, 15, 25, 0.95);
            backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 215, 120, 0.5);
            border-radius: 48px;
            padding: 32px 28px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            z-index: 2500;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.85, 0.3, 1.05);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
        }
        .search-card.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .search-card h3 { font-size: 24px; font-weight: 500; color: #FFE8B6; margin-bottom: 24px; }
        .search-card input {
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 215, 120, 0.4);
            border-radius: 28px;
            padding: 14px 18px;
            margin-bottom: 16px;
            color: white;
            outline: none;
            font-size: 16px;
            text-align: center;
        }
        .search-card input:focus { border-color: #FFD966; background: rgba(255, 255, 255, 0.2); transform: scale(1.02); }
        .search-card .search-actions { display: flex; gap: 12px; margin-top: 20px; }
        .search-card button { flex: 1; background: #FFD966; color: #1a1a2e; border: none; padding: 12px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .search-card button:hover { opacity: 0.9; transform: scale(0.97); }
        .search-card .btn-cancel-search { background: rgba(255, 255, 255, 0.2); color: #FFE8B6; }

        /* منطقة عرض المنشورات */
        .posts-container {
            position: fixed;
            top: 100px;
            left: 20px;
            right: 20px;
            bottom: 100px;
            overflow-y: auto;
            z-index: 90;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 8px 4px;
        }
        .post-card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 120, 0.4);
            border-radius: 32px;
            padding: 20px;
            color: white;
            animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .post-card h4 { color: #FFD966; font-size: 20px; margin-bottom: 8px; }
        .post-card p { color: #ddd; font-size: 15px; margin-bottom: 12px; }
        .post-card small { color: #aaa; font-size: 12px; display: block; margin-top: 8px; border-top: 1px solid rgba(255,215,120,0.3); padding-top: 8px; }

        /* كارد تسجيل الدخول */
        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 32px;
            padding: 40px 32px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            color: white;
            display: none;
            z-index: 1000;
            opacity: 0;
            transform: scale(0.96) translateY(8px);
            transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.4s;
        }
        .glass-card.show-card { display: block; opacity: 1; transform: scale(1) translateY(0); }
        .glass-card.hide-card { opacity: 0; transform: scale(0.96) translateY(8px); transition: opacity 0.3s ease, transform 0.3s ease; }
        .glass-card h2 { margin-bottom: 28px; font-weight: 500; font-size: 28px; background: linear-gradient(135deg, #fff, rgba(255,255,255,0.8)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .glass-input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 14px 18px; margin-bottom: 18px; color: white; outline: none; text-align: center; font-size: 16px; }
        .glass-input:focus { background: rgba(255,255,255,0.2); transform: scale(1.02); }
        .glass-btn { background: rgba(255,255,255,0.95); color: #1a1a2e; border: none; padding: 14px 28px; border-radius: 28px; cursor: pointer; width: 100%; font-weight: 600; transition: all 0.3s ease; }
        .glass-btn:hover { transform: translateY(-2px); background: white; }
        .glass-btn.google-btn { background: #4285F4; color: white; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .glass-btn.google-btn:hover { background: #3367D6; }
        .glass-btn.guest-btn { background: rgba(255,255,255,0.2); color: white; margin-top: 12px; }
        .glass-btn.secondary { background: rgba(255,255,255,0.2); color: white; }

        /* كارد الترحيب */
        .welcome-card {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.92);
            background: rgba(20,25,35,0.88); backdrop-filter: blur(36px); border: 1px solid rgba(255,255,255,0.35);
            border-radius: 64px; padding: 32px 56px; text-align: center; z-index: 3000;
            opacity: 0; visibility: hidden; transition: all 0.45s cubic-bezier(0.2,0.9,0.3,1.05);
            box-shadow: 0 30px 50px rgba(0,0,0,0.4); pointer-events: none;
        }
        .welcome-card.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .welcome-card h3 { font-size: 2.2rem; margin-bottom: 8px; background: linear-gradient(135deg, #FFF8E7, #FFE8C7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .welcome-card p { font-size: 1.8rem; font-weight: 600; color: #FFE4B5; }

        /* كارد المعلومات */
        .info-card {
            position: fixed; top: 50%; left: 50%; background: rgba(0,0,0,0.9); backdrop-filter: blur(32px);
            border: 1px solid rgba(255,200,120,0.5); border-radius: 44px; padding: 32px 28px;
            width: 85%; max-width: 320px; text-align: center; color: #FFECB3; z-index: 2000;
            opacity: 0; visibility: hidden; transform: translate(-50%, -50%) scale(0.94);
            transition: all 0.4s cubic-bezier(0.2,0.85,0.3,1.05);
        }
        .info-card.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .info-card button { background: #FFD966; color: #1F2A2E; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; }

        /* الملف الشخصي */
        #profileCard {
            background: rgba(15, 20, 30, 0.88);
            backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 215, 120, 0.4);
        }
        #displayName, #displayAge { margin-bottom: 15px; font-size: 17px; }

        /* الدوك */
        .dock {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: rgba(255,255,255,0.25); backdrop-filter: blur(20px);
            border-radius: 45px; padding: 8px 18px; display: flex; justify-content: space-between;
            z-index: 100; transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }
        .icon-circle { width: 52px; height: 52px; background: rgba(255,255,255,0.3); border-radius: 32px; display: flex; justify-content: center; align-items: center; transition: 0.25s; border: 0.5px solid rgba(255,255,255,0.5); }
        .icon-svg { width: 24px; height: 24px; stroke: #ffffff; stroke-width: 1.9; fill: none; }
        .dock-item { flex: 1; display: flex; justify-content: center; cursor: pointer; }
        .dock-item:active { transform: scale(0.92); }
        .dock-item:hover .icon-circle { background: rgba(255,255,255,0.55); transform: scale(1.05); }
        @media (min-width: 581px) { .dock { background: rgba(0,0,0,0.85); } .icon-circle { background: rgba(30,30,40,0.7); } }
        @media (max-width: 500px) { .icon-circle { width: 46px; height: 46px; } .posts-container { top: 90px; bottom: 90px; } }

        .install-btn {
            position: fixed; top: 20px; left: 20px; padding: 8px 20px; border-radius: 40px;
            background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(12px); display: none; z-index: 100; cursor: pointer;
            font-size: 13px;
        }
        .install-btn:hover { background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <button class="install-btn" id="installBtn">📲 تثبيت التطبيق</button>

    <!-- زر نشر طلب شريك -->
    <div class="search-partner-btn" id="searchPartnerBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15" y2="15"/></svg>
        <span>➕ نشر طلب شريك</span>
    </div>

    <!-- كارد إضافة منشور -->
    <div id="searchCard" class="search-card">
        <h3>➕ نشر طلب شريك</h3>
        <input type="text" id="clubName" placeholder="اسم النادي أو الصالة الرياضية">
        <input type="text" id="clubLocation" placeholder="المكان (المدينة / المنطقة)">
        <div class="search-actions">
            <button id="confirmSearchBtn">📢 نشر</button>
            <button id="cancelSearchBtn" class="btn-cancel-search">إلغاء</button>
        </div>
    </div>

    <!-- منطقة عرض المنشورات -->
    <div id="postsContainer" class="posts-container">
        <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">✨ مرحباً بك، قم بتسجيل الدخول للنشر ✨</div>
    </div>

    <!-- كارد الترحيب -->
    <div id="welcomeCard" class="welcome-card"><h3>مرحباً</h3><p id="welcomeUserName"></p></div>

    <!-- كارد المعلومات -->
    <div id="infoCard" class="info-card">
        <p id="infoMessage"></p>
        <button id="confirmBtn">حسناً</button>
        <button id="cancelConfirmBtn" style="display:none;">لا</button>
    </div>

    <!-- كارد تسجيل الدخول -->
    <div id="authCard" class="glass-card">
        <h2>مرحباً بك</h2>
        <input type="text" id="regName" class="glass-input" placeholder="اسمك (اختياري)">
        <button id="googleLoginBtn" class="glass-btn google-btn">🔐 تسجيل دخول بـ Google</button>
        <button id="guestLoginBtn" class="glass-btn guest-btn">👤 دخول كزائر</button>
    </div>

    <!-- كارد الملف الشخصي -->
    <div id="profileCard" class="glass-card">
        <h2>ملفي الشخصي</h2>
        <div id="viewData">
            <p id="displayName" style="margin-bottom: 12px;"></p>
            <p id="displayAge" style="margin-bottom: 25px;"></p>
            <button class="glass-btn secondary" id="logoutBtn">تسجيل خروج</button>
        </div>
    </div>

    <!-- الدوك -->
    <div class="dock">
        <div class="dock-item" id="profileBtn"><div class="icon-circle"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div></div>
        <div class="dock-item" id="notificationsBtn"><div class="icon-circle"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div></div>
        <div class="dock-item" id="messagesBtn"><div class="icon-circle"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div></div>
        <div class="dock-item" id="homeBtn"><div class="icon-circle"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H9v8H4a2 2 0 0 1-2-2z"/></svg></div></div>
    </div>

    <script type="module">
        // ========== 1. استيراد Firebase ==========
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";

        // ========== 2. إعداد Firebase ==========
        const firebaseConfig = {
            apiKey: "AIzaSyB4q0306cgLhI6ebiGOcB-T9Nm5grBL0ck",
            authDomain: "onex-65f46.firebaseapp.com",
            projectId: "onex-65f46",
            storageBucket: "onex-65f46.firebasestorage.app",
            messagingSenderId: "653315530921",
            appId: "1:653315530921:web:ac053628235e7fedb649b8",
            measurementId: "G-Q6V661GEX7"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const database = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const postsRef = ref(database, 'posts');

        // ========== 3. عناصر DOM ==========
        const infoCard = document.getElementById('infoCard');
        const infoMessage = document.getElementById('infoMessage');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelConfirmBtn = document.getElementById('cancelConfirmBtn');
        const welcomeCard = document.getElementById('welcomeCard');
        const welcomeUserName = document.getElementById('welcomeUserName');
        const authCard = document.getElementById('authCard');
        const profileCard = document.getElementById('profileCard');
        const searchCard = document.getElementById('searchCard');
        const searchPartnerBtn = document.getElementById('searchPartnerBtn');
        const confirmSearchBtn = document.getElementById('confirmSearchBtn');
        const cancelSearchBtn = document.getElementById('cancelSearchBtn');
        const clubNameInput = document.getElementById('clubName');
        const clubLocationInput = document.getElementById('clubLocation');
        const postsContainer = document.getElementById('postsContainer');
        const regNameInput = document.getElementById('regName');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const guestLoginBtn = document.getElementById('guestLoginBtn');
        const displayNameSpan = document.getElementById('displayName');
        const logoutBtn = document.getElementById('logoutBtn');

        let welcomeTimeout = null;
        let currentUserName = null;

        // ========== 4. دوال مساعدة ==========
        function showInfoCard(message) {
            infoMessage.innerText = message;
            cancelConfirmBtn.style.display = 'none';
            confirmBtn.innerText = 'حسناً';
            infoCard.classList.add('show');
        }

        function hideInfoCard() { 
            infoCard.classList.remove('show'); 
        }

        confirmBtn.onclick = () => { hideInfoCard(); };
        infoCard.addEventListener('click', (e) => { if (e.target === infoCard) hideInfoCard(); });

        function showWelcomeCard(userName) {
            if (welcomeTimeout) clearTimeout(welcomeTimeout);
            welcomeUserName.innerText = userName;
            welcomeCard.classList.add('show');
            welcomeTimeout = setTimeout(() => welcomeCard.classList.remove('show'), 3000);
        }

        function showCardWithAnimation(card) { 
            card.classList.remove('hide-card'); 
            card.classList.add('show-card'); 
        }
        
        function hideCardWithAnimation(card) {
            card.classList.remove('show-card');
            card.classList.add('hide-card');
            setTimeout(() => { 
                if (card.classList.contains('hide-card')) card.style.display = 'none'; 
            }, 300);
        }

        function escapeHtml(str) { 
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) { 
                if(m === '&') return '&amp;'; 
                if(m === '<') return '&lt;'; 
                if(m === '>') return '&gt;'; 
                return m;
            }); 
        }

        // ========== 5. عرض المنشورات ==========
        function displayPost(postId, postData) {
            if (document.querySelector(`.post-card[data-id="${postId}"]`)) return;
            
            const clubName = postData.clubName || "غير محدد";
            const location = postData.location || "غير محدد";
            const userName = postData.name || postData.userName || "مستخدم";
            const date = postData.date || new Date(postData.timestamp).toLocaleString('ar-EG');
            
            const postDiv = document.createElement('div');
            postDiv.className = 'post-card';
            postDiv.setAttribute('data-id', postId);
            postDiv.innerHTML = `
                <h4>🏋️ ${escapeHtml(clubName)}</h4>
                <p>📍 المكان: ${escapeHtml(location)}</p>
                <p>👤 بواسطة: ${escapeHtml(userName)}</p>
                <small>📅 ${escapeHtml(date)}</small>
            `;
            
            if (postsContainer.firstChild && postsContainer.firstChild.classList && postsContainer.firstChild.classList.contains('post-card')) {
                postsContainer.insertBefore(postDiv, postsContainer.firstChild);
            } else {
                postsContainer.prepend(postDiv);
            }
        }

        // تحميل المنشورات
        let postsLoaded = false;
        function loadPosts() {
            if (postsLoaded) return;
            const postsQuery = query(ref(database, 'posts'), orderByChild('timestamp'), limitToLast(50));
            onChildAdded(postsQuery, (snapshot) => {
                const postData = snapshot.val();
                if (postData) displayPost(snapshot.key, postData);
                if (postsContainer.children.length === 1 && postsContainer.firstChild.innerText.includes("مرحباً بك")) {
                    postsContainer.innerHTML = '';
                }
            });
            postsLoaded = true;
        }

        // ========== 6. نشر منشور جديد (حسب طلب المهندسة) ==========
        function publishPost() {
            const currentUser = auth.currentUser;
            const clubName = clubNameInput.value.trim();
            const location = clubLocationInput.value.trim();
            const userName = currentUserName || regNameInput.value.trim() || "مستخدم";

            if (!clubName && !location) {
                alert("الرجاء إدخال اسم النادي أو المكان");
                return;
            }

            if (currentUser) {
                push(postsRef, { 
                    clubName: clubName || "غير محدد", 
                    location: location || "غير محدد", 
                    uid: currentUser.uid, 
                    name: userName, 
                    timestamp: Date.now(), 
                    date: new Date().toLocaleString('ar-EG') 
                }).then(() => {
                    alert("✅ تم النشر بنجاح!");
                    clubNameInput.value = "";
                    clubLocationInput.value = "";
                    searchCard.classList.remove('show');
                }).catch((error) => {
                    alert("❌ خطأ في النشر");
                    console.error(error);
                });
            } else {
                alert("⚠️ Firebase لسه بيحمل! يرجى تسجيل الدخول أولاً");
                authCard.style.display = 'block';
                showCardWithAnimation(authCard);
            }
        }

        // ========== 7. تحديث واجهة المستخدم بعد تسجيل الدخول ==========
        function updateUIAfterLogin(user, displayName) {
            currentUserName = displayName || user.displayName || regNameInput.value.trim() || "مستخدم";
            
            if (regNameInput.value.trim()) {
                localStorage.setItem('userName', regNameInput.value.trim());
            } else if (user.displayName) {
                localStorage.setItem('userName', user.displayName);
            }
            
            showWelcomeCard(currentUserName);
            hideCardWithAnimation(authCard);
            loadPosts();
            displayNameSpan.innerText = `👤 الاسم: ${currentUserName}`;
        }

        // ========== 8. طرق تسجيل الدخول ==========
        googleLoginBtn.onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const name = result.user.displayName || regNameInput.value.trim() || "مستخدم Google";
                updateUIAfterLogin(result.user, name);
            } catch (error) {
                console.error(error);
                alert("خطأ في تسجيل الدخول: " + error.message);
            }
        };

        guestLoginBtn.onclick = async () => {
            try {
                const result = await signInAnonymously(auth);
                const name = regNameInput.value.trim() || "زائر";
                updateUIAfterLogin(result.user, name);
            } catch (error) {
                console.error(error);
                alert("خطأ: " + error.message);
            }
        };

        // ========== 9. مراقبة حالة تسجيل الدخول ==========
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const savedName = localStorage.getItem('userName');
                currentUserName = savedName || user.displayName || "مستخدم";
                if (authCard.style.display !== 'none') {
                    hideCardWithAnimation(authCard);
                }
                loadPosts();
                displayNameSpan.innerText = `👤 الاسم: ${currentUserName}`;
            } else {
                currentUserName = null;
                authCard.style.display = 'block';
                showCardWithAnimation(authCard);
            }
        });

        // ========== 10. تسجيل الخروج ==========
        logoutBtn.onclick = async () => {
            try {
                await signOut(auth);
                localStorage.clear();
                location.reload();
            } catch (error) {
                console.error(error);
                alert("خطأ في تسجيل الخروج");
            }
        };

        // ========== 11. بقية الوظائف ==========
        function hideAllCards() {
            hideInfoCard();
            searchCard.classList.remove('show');
            if (profileCard.style.display === 'block') {
                hideCardWithAnimation(profileCard);
                setTimeout(() => profileCard.style.display = 'none', 300);
            }
        }

        document.getElementById('profileBtn').onclick = () => {
            hideAllCards();
            if (!auth.currentUser) {
                alert("الرجاء تسجيل الدخول أولاً");
                authCard.style.display = 'block';
                showCardWithAnimation(authCard);
                return;
            }
            profileCard.style.display = 'block';
            showCardWithAnimation(profileCard);
        };

        document.getElementById('homeBtn').onclick = () => {
            hideAllCards();
            if (auth.currentUser && currentUserName) {
                showWelcomeCard(currentUserName);
            }
        };

        document.getElementById('messagesBtn').onclick = () => { 
            hideAllCards(); 
            alert("📭 لا توجد رسائل حالياً"); 
        };
        document.getElementById('notificationsBtn').onclick = () => { 
            hideAllCards(); 
            alert("🔔 لا توجد إشعارات جديدة"); 
        };

        searchPartnerBtn.onclick = () => {
            if (!auth.currentUser) {
                alert("❌ لازم تسجل دخول أولاً!");
                authCard.style.display = 'block';
                showCardWithAnimation(authCard);
                return;
            }
            searchCard.classList.add('show');
        };

        confirmSearchBtn.onclick = () => publishPost();
        cancelSearchBtn.onclick = () => searchCard.classList.remove('show');
        searchCard.addEventListener('click', (e) => { 
            if (e.target === searchCard) searchCard.classList.remove('show'); 
        });
        
        clubNameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') publishPost(); });
        clubLocationInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') publishPost(); });

        // ========== 12. PWA التثبيت ==========
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { 
            e.preventDefault(); 
            deferredPrompt = e; 
            document.getElementById('installBtn').style.display = 'flex'; 
        });
        
        document.getElementById('installBtn').onclick = () => { 
            if (deferredPrompt) { 
                deferredPrompt.prompt(); 
                deferredPrompt.userChoice.then(() => { 
                    document.getElementById('installBtn').style.display = 'none'; 
                    deferredPrompt = null; 
                }); 
            } 
        };
        
        if (window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('installBtn').style.display = 'none';
        }

        // ========== 13. تغيير لون الدوك حسب الخلفية ==========
        function updateDockByBackground() {
            const isNarrow = window.innerWidth <= 580;
            const dockElement = document.querySelector('.dock');
            if (!dockElement) return;
            if (isNarrow) { 
                dockElement.style.background = "rgba(245, 245, 245, 0.35)"; 
                document.querySelectorAll('.icon-circle').forEach(c => c.style.background = "rgba(255,255,255,0.4)"); 
            } else { 
                dockElement.style.background = "rgba(0, 0, 0, 0.85)"; 
                document.querySelectorAll('.icon-circle').forEach(c => c.style.background = "rgba(30,30,40,0.7)"); 
            }
        }
        window.addEventListener('resize', updateDockByBackground);
        updateDockByBackground();
    </script>
</body>
</html>
